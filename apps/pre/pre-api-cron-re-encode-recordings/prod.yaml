apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pre-api-cron-re-encode-recordings
  namespace: pre
spec:
  values:
    global:
      jobKind: CronJob
    job:
      schedule: "30 19-23 * * *" # Run hourly from 7pm to midnight
      suspend: false
      disableActiveClusterCheck: true
      memoryRequests: "1Gi"
      memoryLimits: "2Gi"
      image: hmctsprod.azurecr.io/pre/api:prod-04b6ae7-20260518122109 # {"$imagepolicy": "flux-system:pre-api"}
      environment:
        PLATFORM_ENV_TAG: Production
        REENCODE_RECORDINGS_FORCE: "false"
