apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pre-api-cron-re-encode-recordings
  namespace: pre
spec:
  values:
    global:
      jobKind: CronJob
    job:
      schedule: "15 * * * *" # Run hourly
      suspend: false
      disableActiveClusterCheck: false
      memoryRequests: "1Gi"
      memoryLimits: "2Gi"
      image: hmctsprod.azurecr.io/pre/api:prod-d17f0be-20260703130658 # {"$imagepolicy": "flux-system:pre-api"}
      environment:
        PLATFORM_ENV_TAG: Production
        REENCODE_RECORDINGS_FORCE: "false"
