apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pre-api-cron-process-capture-sessions
  namespace: pre
spec:
  values:
    global:
      jobKind: CronJob
    job:
      suspend: false
      schedule: "* * * * *" # every min to speed up testing efforts
      image: hmctsprod.azurecr.io/pre/api:staging-272a69a-20260513155223 # {"$imagepolicy": "flux-system:stg-pre-api"}
      environment:
        PLATFORM_ENV_TAG: Staging
        ENABLE_ENHANCED_PROCESSING: true
