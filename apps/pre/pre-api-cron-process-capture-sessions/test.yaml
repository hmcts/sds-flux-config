apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pre-api-cron-process-capture-sessions
  namespace: pre
spec:
  values:
    global:
      jobKind: CronJob
    job:
      suspend: true
      schedule: "*/5 * * * *"
      image: hmctsprod.azurecr.io/pre/api:prod-834b01b-20260518135319 # {"$imagepolicy": "flux-system:pre-api"}
      environment:
        PLATFORM_ENV_TAG: Test
        ENABLE_ENHANCED_PROCESSING: false
