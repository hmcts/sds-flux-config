apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pre-api-cron-cleanup-b2c-alternative-emails
  namespace: pre
spec:
  values:
    global:
      jobKind: CronJob
    job:
      suspend: false
      schedule: "10 0 * * *" # At 00:10 Every day
      image: hmctsprod.azurecr.io/pre/api:prod-22b4a04-20260420162526 # {"$imagepolicy": "flux-system:pre-api"}
      environment:
        MEDIA_SERVICE: MediaKind
        PORTAL_URL: https://portal.pre-recorded-evidence.justice.gov.uk/
        MEDIA_KIND_SUBSCRIPTION: pre-mkio-prod
        MEDIA_KIND_SUBSCRIPTION_ID: 1d8c003d-e588-41f7-8e7f-20dbb2f92a39
        MEDIA_KIND_LOCATION: uksouth-4
