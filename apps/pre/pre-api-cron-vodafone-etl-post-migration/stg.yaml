apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pre-api-cron-vodafone-etl-post-migration
  namespace: pre
spec:
  values:
    global:
      jobKind: CronJob
    job:
      schedule: "30 10 2 3 *" # 10.30am (GMT) - 2 Mar
      suspend: false
      memoryRequests: '1Gi'
      memoryLimits: '2Gi'
      image: hmctsprod.azurecr.io/pre/api:staging-ba91ca6-20260624144434 # {"$imagepolicy": "flux-system:stg-pre-api"}
      environment:
        PLATFORM_ENV_TAG: Staging
        ENABLE_NEW_EMAIL_SERVICE: true
