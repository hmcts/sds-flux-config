apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pre-api
  namespace: pre
spec:
  releaseName: pre-api
  values:
    java:
      ingressHost: pre-api.staging.platform.hmcts.net
      memoryRequests: '3Gi'
      memoryLimits: '3Gi'
      image: hmctsprod.azurecr.io/pre/api:staging-2212602-20260424083114 # {"$imagepolicy": "flux-system:stg-pre-api"}
      environment:
        AZURE_RESOURCE_GROUP: pre-stg
        PLATFORM_ENV_TAG: Staging
        AZURE_INGEST_SA: preingestsastg
        AZURE_FINAL_SA: prefinalsastg
        ENABLE_AUTOMATED_EDITING: true
        ENABLE_NULL_DURATION_UPSERT: false
        ENABLE_ENHANCED_PROCESSING: true
        ENABLE_MIGRATION_ADMIN_ENDPOINTS: true
        ENABLE_MIGRATED_DATA: true
        HIKARI_POOL_SIZE: 25
        TESTING_SUPPORT_ENDPOINTS_ENABLED: true
        MEDIA_KIND_STREAMING_ENDPOINT_ADVANCED_SETTINGS_NAME: ap-jitp-hmcts-disable-edge-buffer
