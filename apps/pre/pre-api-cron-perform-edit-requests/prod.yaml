apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pre-api-cron-perform-edit-requests
  namespace: pre
spec:
  values:
    global:
      jobKind: CronJob
    job:
      suspend: false
      disableActiveClusterCheck: true
      schedule: "*/5 * * * 0-5" # every 5 mins, Sunday to Friday
      image: hmctsprod.azurecr.io/pre/api:prod-e1b7868-20260630103157 # {"$imagepolicy": "flux-system:pre-api"}
      environment:
        PORTAL_URL: https://portal.pre-recorded-evidence.justice.gov.uk/
        ENABLE_NEW_EMAIL_SERVICE: true
