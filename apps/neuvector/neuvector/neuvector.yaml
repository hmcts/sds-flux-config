---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector
  namespace: neuvector
spec:
  releaseName: neuvector
  timeout: "900s"
  values:
    config:
      autoScan: true
    rules:
      admission:
        enable: true
        mode: "monitor" # one of: monitor, protect
        defaultRules:
          - action: allow
            comment: Allow admin namespaces
            criteria:
              - name: namespace
                op: containsAny
                value: knode-system,monitoring,flux-system,dynatrace,azureserviceoperator-system,cert-manager,keda,admin,kured,artifactory,pact-broker
          - action: allow
            comment: Allow HMCTS registries
            criteria:
              - name: imageRegistry
                op: containsAny
                value: https://hmctsprod.azurecr.io/,https://hmctssbox.azurecr.io/,https://hmctspublic.azurecr.io/,https://hmctsprivate.azurecr.io/,https://sdshmctspublic.azurecr.io/
          - action: deny
            comment: Default deny
            criteria:
              - name: imageRegistry
                op: containsAny
                value: https://localhost/,https://*.*/
        customRules: []
      response:
        policies:
          - name: admission-control-denied
            event: admission-control
            conditions:
              - type: name
                value: Admission.Control.Denied
            actions:
              - webhook
            disable: false
          - name: security-event-all
            event: security-event
            conditions: []
            actions:
              - webhook
            disable: true
          - name: security-event-error
            event: security-event
            conditions:
              - type: level
                value: Error
            actions:
              - webhook
            disable: false
          - name: security-event-privilege-escalation
            event: security-event
            conditions:
              - type: name
                value: Container.Privilege.Escalation
            actions:
              - quarantine
            disable: true
          - name: cve-report-high
            event: cve-report
            conditions:
              - type: cve-high
                value: "10"
            actions:
              - quarantine
            disable: true
          - name: event-container-quarantined
            event: event
            conditions:
              - type: name
                value: Container.Quarantined
            actions:
              - webhook
            disable: false
          - name: compliance-5-4
            event: compliance
            conditions:
              - type: name
                value: "5.4"
            actions:
              - webhook
            disable: true
    neuvector:
      serviceAccount: neuvector
      resources:
        requests:
          cpu: "100m"
          memory: "2Gi"
        limits:
          cpu: 1
          memory: 5Gi
      controller:
        ingress:
          path: "/"
          enabled: true
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.tls: "true"
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - neuvector-controller-pod
                  topologyKey: "kubernetes.io/hostname"
        replicas: 3
        azureFileShare:
          enabled: true
          secretName: nv-storage-secret
        configmap:
          enabled: true
          data:
            sysinitcfg.yaml: |
              New_Service_Policy_Mode: Discover
              Syslog_ip: fluentbit-log
              Syslog_IP_Proto: 6
              Syslog_Port: 5140
              Syslog_Level: Warning
              Syslog_status: true
              Syslog_in_json: true
              Syslog_Categories:
                - event
                - security-event
                - audit
              Syslog_In_Json: false
              Scan_Config:
                Auto_Scan: true
              Cluster_Name: ${NV_CLUSTER_NAME}
      manager:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - neuvector-manager-pod
                  topologyKey: "kubernetes.io/hostname"
        env:
          ssl: false
        ingress:
          enabled: true
          httpredirect: false
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.tls: "false"
      cve:
        scanner:
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app
                          operator: In
                          values:
                            - neuvector-scanner-pod
                    topologyKey: "kubernetes.io/hostname"
        updater:
          # If false, cve updater will not be installed
          enabled: true
          schedule: "0 0 * * *"
      groups:
        defaultGroups:
          - name: allnamespaces
            criteria:
              - key: namespace
                op: =
                value: '*'
          - name: nv.kube-dns.kube-system
            criteria:
              - key: domain
                op: =
                value: kube-system
          - name: appinsights-endpoints
            criteria:
              - key: address
                op: =
                value: dc.services.visualstudio.com
              - key: address
                op: =
                value: rt.services.visualstudio.com
              - key: address
                op: =
                value: dc.applicationinsights.microsoft.com
              - key: address
                op: =
                value: euw.rt.prod.applicationinsights.trafficmanager.net
          - name: azurepostgres-endpoint
            criteria:
              - key: address
                op: =
                value: '*.postgres.database.azure.com'
          - name: servicebus-endpoint
            criteria:
              - key: address
                op: =
                value: '*.servicebus.windows.net'
          - name: govuknotify-api
            criteria:
              - key: address
                op: =
                value: api.notifications.service.gov.uk
          - name: govukpay-api
            criteria:
              - key: address
                op: =
                value: publicapi.payments.service.gov.uk
          - name: mta-reform-endpoint
            criteria:
              - key: address
                op: =
                value: mta.reform.hmcts.net
          - name: cnp-idam-api
            criteria:
              - key: address
                op: =
                value: idam-api.platform.hmcts.net
          - name: crime-idam-namespace
            criteria:
              - key: namespace
                op: =
                value: crime-idam
        customGroups: []
  chart:
    spec:
      chart: neuvector-azure-keyvault
      # Make sure to update the CRDS when you change the version if required
      # https://github.com/hmcts/sds-flux-config/blob/master/apps/neuvector/neuvector-crds/kustomization.yaml
      # see the versioned folders at https://github.com/neuvector/manifests/blob/main/kubernetes/
      version: 1.6.13
      sourceRef:
        kind: HelmRepository
        name: hmctsprod-oci
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: neuvector-controller-pod
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: longlived-token
                  secret:
                    secretName: neuvector-longlived-token
                    defaultMode: 420
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                  name: longlived-token
                  readOnly: true
              - op: add
                path: /spec/template/spec/initContainers/0/volumeMounts
                value:
                  - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                    name: longlived-token
                    readOnly: true
