apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: darts-portal
  namespace: darts-modernisation
spec:
  releaseName: darts-portal
  values:
    nodejs:
      image: hmctsprod.azurecr.io/darts/portal:pr-2330-ac53ee6-20260429102345
      ingressHost: darts.ithc.apps.hmcts.net
      environment:
        RESTART_ME: '001'
        DARTS_AZUREAD_B2C_ORIGIN_HOST: https://hmctsithcextid.b2clogin.com
        DARTS_PORTAL_ALLOW_STUB_DATA: true
        MANUAL_DELETION_ENABLED: true
        EVENT_OBFUSCATION_ENABLED: true
