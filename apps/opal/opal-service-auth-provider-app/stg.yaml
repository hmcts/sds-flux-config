apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opal-service-auth-provider-app
  namespace: opal
spec:
  releaseName: opal-service-auth-provider-app
  values:
    java:
      ingressHost: opal-service-auth-provider-app.staging.platform.hmcts.net
      environment:
        DUMMY_VAR: 0
        FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/stg
