apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: opal-fines-service-pr
  annotations:
    hmcts.github.com/prod-automated: disabled
spec:
  imageRepositoryRef:
    name: juror-api
  filterTags:
    extract: $ts
    pattern: '^pr-1917-[a-f0-9]+-(?P<ts>[0-9]+)'
  policy:
    alphabetical:
      order: asc