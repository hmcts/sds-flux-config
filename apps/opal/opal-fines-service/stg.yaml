apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opal-fines-service
  namespace: opal
spec:
  releaseName: opal-fines-service
  values:
    java:
      ingressHost: opal-fines-service.staging.platform.hmcts.net
      image: hmctsprod.azurecr.io/opal/fines-service:pr-1772
      environment:
        RESTART_FLAG: 0
        OPAL_FRONTEND_URL: https://opal-frontend.staging.apps.hmcts.net
        OPAL_USER_SERVICE_API_URL: https://opal-user-service.staging.platform.hmcts.net
        OPAL_LEGACY_GATEWAY_URL: https://cloudgobgateway.test.platform.hmcts.net/opal
        FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/stg
