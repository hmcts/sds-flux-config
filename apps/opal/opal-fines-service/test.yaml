  namespace: opal
spec:
  releaseName: opal-fines-service
  values:
    java:
      image: hmctsprod.azurecr.io/opal/fines-service:pr-xxxx-80d1e57-20260609171955 # {"$imagepolicy": "flux-system:test-opal-fines-service"}
      ingressHost: opal-fines-service.test.platform.hmcts.net
