apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opal-external-api
  namespace: opal
spec:
  releaseName: opal-external-api
  values:
    java:
      ingressHost: opal-external-api.staging.platform.hmcts.net
      environment:
        DUMMY_VAR: 0
        OPAL_FINES_S2S_URL: https://opal-fines-service.staging.platform.hmcts.net
        FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/stg
