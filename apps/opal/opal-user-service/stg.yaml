apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opal-user-service
  namespace: opal
spec:
  releaseName: opal-user-service
  values:
    java:
      ingressHost: opal-user-service.staging.platform.hmcts.net
      environment:
        DUMMY_VAR: 1
        OPAL_FRONTEND_URL: https://opal-frontend.staging.apps.hmcts.net
        FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/stg
