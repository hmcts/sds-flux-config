apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opal-user-service
  namespace: opal
spec:
  releaseName: opal-user-service
  values:
    java:
      image: hmctsprod.azurecr.io/opal/user-service:prod-0ff1533-20260616111952 # {"$imagepolicy": "flux-system:opal-user-service-pr"}
      ingressHost: opal-user-service.test.platform.hmcts.net
      environment:
        DUMMY_VAR: 1
        OPAL_FRONTEND_URL: https://opal-frontend.test.apps.hmcts.net
        FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/perfTest
