apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opal-logging-service
  namespace: opal
spec:
  releaseName: opal-logging-service
  values:
    java:
      ingressHost: opal-logging-service.staging.platform.hmcts.net
      image: hmctsprod.azurecr.io/opal/logging-service:pr-157
      environment:
        RESTART_FLAG: 1
        OPAL_LOGGING_TEST_SUPPORT_ENABLED: true
        FLYWAY_LOCATIONS: classpath:db/migration/ddl, classpath:db/migration/data/allEnvs, classpath:db/migration/data/nle, classpath:db/migration/data/stg