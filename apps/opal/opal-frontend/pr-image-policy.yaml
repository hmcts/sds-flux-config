apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: opal-frontend-pr
  annotations:
    hmcts.github.com/prod-automated: disabled
spec:
  imageRepositoryRef:
    name: opal-frontend
  filterTags:
    extract: $ts
    pattern: '^pr-2733-[a-f0-9]+-(?P<ts>[0-9]+)'
  policy:
    alphabetical:
      order: asc