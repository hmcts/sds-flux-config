apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-k8s-sigs
  namespace: admin
spec:
  releaseName: external-dns-k8s-sigs
  chart:
    spec:
      chart: imported/k8s-sigs/external-dns-chart
      version: 1.20.0
      sourceRef:
        kind: HelmRepository
        name: hmctsprod-oci
        namespace: flux-system
  interval: 1m
  values:
    provider: azure-private-dns
    # Filter to only manage ingresses with this specific annotation
    annotationFilter: "external-dns.alpha.kubernetes.io/controller=k8s-sigs"
    image:
      repository: hmctsprod.azurecr.io/imported/k8s-sigs/external-dns
      tag: v0.20.0
    serviceAccount:
      create: false
      name: admin
      automountServiceAccountToken: true
    podLabels:
      azure.workload.identity/use: "true"
    sources:
      - ingress
    extraArgs:
      azure-resource-group: core-infra-intsvc-rg
      azure-subscription-id: 1baf5470-1c3e-40d3-a6f7-74bfbce4b348
    global:
      security:
        allowInsecureImages: true