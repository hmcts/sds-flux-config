apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pip-data-management-scheduled-subscriptions-cron
spec:
  releaseName: pip-data-management-scheduled-subscriptions-cron
  values:
    job:
      schedule: "30 10 * * 1,3,5"
      environment:
        DATA_MANAGEMENT_URL: https://pip-data-management.demo.platform.hmcts.net
        ACCOUNT_MANAGEMENT_URL: https://pip-account-management.demo.platform.hmcts.net
        TRIGGER_TYPE: SCHEDULED_LIST_TYPE_SUBSCRIPTIONS