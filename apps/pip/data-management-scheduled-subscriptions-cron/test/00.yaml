apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pip-data-management-scheduled-subscriptions-cron
spec:
  releaseName: pip-data-management-scheduled-subscriptions-cron
  values:
    job:
      image: hmctsprod.azurecr.io/pip/cron-trigger:pr-232-d30482c-20260306123248
      schedule: "30 12 * * 0,2,4,6"
      environment:
        DATA_MANAGEMENT_URL: https://pip-data-management.test.platform.hmcts.net
        ACCOUNT_MANAGEMENT_URL: https://pip-account-management.test.platform.hmcts.net
        TRIGGER_TYPE: SCHEDULED_LIST_TYPE_SUBSCRIPTIONS