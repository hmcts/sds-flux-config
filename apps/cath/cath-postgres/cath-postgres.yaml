apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cath-postgres
spec:
  releaseName: cath-postgres
  values:
    nodejs:
      image: hmctspublic.azurecr.io/cath/cath-postgres:prod-latest # {"$imagepolicy": "flux-system:cath-postgres"}
      disableTraefikTls: true
  chart:
    spec:
      chart: ./stable/cath-postgres
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 5m
  install:
    disableWait: true
  upgrade:
    disableWait: true
