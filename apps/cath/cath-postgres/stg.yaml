apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cath-postgres
spec:
  releaseName: cath-postgres
  values:
    nodejs:
      ingressHost: cath-postgres.staging.platform.hmcts.net
      keyVaults:
        pip-ss-kv:
          secrets:
            - name: postgres-host
              alias: POSTGRES_HOST
            - name: postgres-user
              alias: POSTGRES_USER
            - name: postgres-password
              alias: POSTGRES_PASSWORD
            - name: postgres-port
              alias: POSTGRES_PORT
