apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cath-postgres
spec:
  releaseName: cath-postgres
  values:
    nodejs:
      ingressHost: cath-postgres.staging.platform.hmcts.net
      keyVaults:
        pip-ss-kv:
          secrets:
            - name: postgres-url
              alias: DATABASE_URL
