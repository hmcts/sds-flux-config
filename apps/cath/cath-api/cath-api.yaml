apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cath-api
spec:
  releaseName: cath-api
  values:
    nodejs:
      image: hmctspublic.azurecr.io/cath/cath-api:prod-aa0825a-20260610164418 # {"$imagepolicy": "flux-system:cath-api"}
      disableTraefikTls: true
  chart:
    spec:
      chart: cath-api
      version: ">=0.0.1-0"
      sourceRef:
        kind: HelmRepository
        name: hmctsprod-oci # correct
        namespace: flux-system
      interval: 1m
